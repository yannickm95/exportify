version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - "patch"
          - "minor"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      # TODO: remove once dependabot supports `pnpm-workspace.yaml` settings (https://github.com/dependabot/dependabot-core/issues/14794)
      default-days: 1
    groups:
      minor-and-patch:
        update-types:
          - "patch"
          - "minor"
